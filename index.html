<script>
    document.getElementById('btn-lang').addEventListener('click', () => {
        document.getElementById('page-body').classList.toggle('spanish-mode');
    });

    try {
        const cururl = new URL(window.location.href);
        const p = new URLSearchParams(cururl.search);

        // Official Deledao Mappings
        const set = (id, val) => { 
            if(val) document.getElementById(id).textContent = val; 
        };

        set('u-val', p.get('uid'));
        set('ou-val', p.get('ou'));
        set('p-val', p.get('pgroup'));
        set('c-val', p.get('cname'));
        set('cat-val', p.get('category'));
        set('r-val', p.get('reason') || 'Policy Violation');

        // URL Handling with Decoding
        let blockedUrl = p.get('site');
        if (blockedUrl) {
            blockedUrl = decodeURIComponent(blockedUrl);
            // Clean it up for display: strip https:// and show only the domain
            document.getElementById('url-val').textContent = blockedUrl.replace(/^https?:\/\//, '').split('/')[0];
        }

    } catch (e) { 
        console.error("Data Load Error:", e); 
    }
</script>
