<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Restricted | MCRSD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css?family=Roboto:400,700,900');
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        .mcrsd-container {
            height: 100vh; width: 100vw;
            background: radial-gradient(ellipse at center, #4a4a4a 0%, #121212 100%);
            font-family: 'Roboto', Arial, sans-serif;
            color: #fcfcfc; text-align: center;
            display: flex; align-items: center; justify-content: center;
        }
        .mcrsd-card { max-width: 600px; padding: 20px; width: 100%; }
        .mcrsd-header { color: #00AAD7; font-size: 45px; font-weight: 700; margin: 0; }
        .mcrsd-district { color: #dfdfdf; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .lock-icon {
            width: 100px; height: 100px; margin: 20px auto;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path fill="%2300AAD7" d="M400 224h-24v-72C376 64.48 311.52 0 224 0S72 64.48 72 152v72H48c-26.51 0-48 21.49-48 48v192c0 26.51 21.49 48 48 48h352c26.51 0 48-21.49 48-48V272c0-26.51-21.49-48-48-48zm-104 0H152v-72c0-39.7 32.3-72 72-72s72 32.3 72 72v72z"/></svg>');
            background-repeat: no-repeat; background-position: center;
        }
        .warning-bar { 
            background-color: #ffcc00; color: #000; padding: 15px 20px; 
            font-size: 16px; margin: 25px auto; font-weight: 900; 
            text-transform: uppercase; border-radius: 4px; display: inline-block;
        }
        .admin-data {
            background: rgba(0, 0, 0, 0.6); border: 2px solid #00AAD7; 
            border-radius: 4px; padding: 20px; text-align: left; font-size: 14px; display: inline-block; min-width: 380px;
        }
        .admin-data b { color: #00AAD7; }
        .teacher-notes { margin-top: 15px; padding-top: 15px; border-top: 1px solid #777; color: #fff; font-size: 13px; }
    </style>
</head>
<body>
    <div class="mcrsd-container" role="alert">
        <div class="mcrsd-card">
            <div class="mcrsd-district">Maricopa County Regional School District</div>
            <div class="lock-icon"></div>
            <h1 class="mcrsd-header">Access Restricted</h1>
            <p style="font-size: 20px; font-weight: 400;">Blocked by Administrator.</p>
            <div class="warning-bar">ATTEMPT LOGGED & REPORTED</div>
            <div class="admin-data">
                <div><b>Student:</b> <span id="user_email">Loading...</span></div>
                <div><b>Website:</b> <span id="blocked_url">Loading...</span></div>
                <div><b>Reason:</b> <span id="reason">Policy Violation</span></div>
                <div class="teacher-notes">
                    <b style="color: #ffcc00;">TEACHER INSTRUCTIONS:</b><br>
                    1. Screenshot this screen. 2. Email MCRSD Help Desk.
                </div>
            </div>
        </div>
    </div>

    <script>
        // Script to grab Deledao parameters from the URL
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('user_email').textContent = urlParams.get('user_email') || 'N/A';
        document.getElementById('blocked_url').textContent = urlParams.get('url') || 'N/A';
        document.getElementById('reason').textContent = urlParams.get('category') || 'Web Filter';
    </script>
</body>
</html>
