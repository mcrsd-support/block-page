<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Restricted | MCRSD</title>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Roboto:400,700,900');
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #121212; color: #fcfcfc; font-family: 'Roboto', sans-serif; }
        .background-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #333 0%, #121212 100%); z-index: -1; }
        .card { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 500px; padding: 30px; text-align: center; border-radius: 12px; border: 2px solid #00AAD7; background: rgba(18, 18, 18, 0.98); box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        h1 { color: #00AAD7; font-size: 32px; font-weight: 900; margin-bottom: 20px; }
        .data-grid { text-align: left; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 8px; border: 1px solid #333; }
        .label { color: #00AAD7; font-size: 10px; font-weight: 900; text-transform: uppercase; display: block; margin-top: 10px; }
        .value { font-size: 14px; border-bottom: 1px solid #222; padding-bottom: 5px; display: block; }
        .btn { background: #00AAD7; color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px; }
        footer { margin-top: 20px; font-size: 9px; color: #444; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
<div class="background-overlay"></div>
<main class="card">
    <div style="font-size: 10px; color: #888; letter-spacing: 2px;">MCRSD SECURITY</div>
    <h1>Access Restricted</h1>
    
    <div class="data-grid">
        <span class="label">Student</span>
        <span id="uid" class="value">Searching...</span>

        <span class="label">Website</span>
        <span id="website" class="value">---</span>

        <span class="label">Category</span>
        <span id="category" class="value">---</span>
    </div>

    <button id="unblockreq" class="btn">REQUEST UNBLOCK</button>

    <footer>
        <span>ADA COMPLIANT</span>
        <span>VER 1.2.5 (LEGACY-LOGIC)</span>
    </footer>
</main>

<script>
    // This is the "Old School" way that usually works best with Deledao
    (function() {
        const cururl = new URL(window.location.href);
        const curparams = new URLSearchParams(cururl.search);

        // Directly using the keys from your provided sample file
        let student = curparams.get("uid");
        let site = curparams.get("site");
        let cat = curparams.get("category");
        let pgroup = curparams.get("pgroup");

        if (student) {
            document.getElementById("uid").innerText = decodeURIComponent(student);
        } else {
            // If UID is missing, let's try to grab it from the raw string manually
            const raw = window.location.href;
            if (raw.indexOf("uid=") > -1) {
                let manual = raw.split("uid=")[1].split("&")[0];
                document.getElementById("uid").innerText = decodeURIComponent(manual);
            } else {
                document.getElementById("uid").innerText = "Identity Not Sent";
            }
        }

        if (site) {
            document.getElementById("website").innerText = decodeURIComponent(site).replace(/^https?:\/\//, '').split('/')[0];
        }
        if (cat) document.getElementById("category").innerText = cat;
        
        // Hide button if it's a parent block
        if (pgroup === "parent") {
            document.getElementById("unblockreq").style.display = "none";
        }
    })();
</script>
</body>
</html>
