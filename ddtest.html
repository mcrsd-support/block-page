<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deledao Variable Debugger</title>
    <style>
        body { font-family: monospace; background: #f0f0f0; padding: 20px; }
        .container { background: white; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .var-row { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; }
        .var-name { font-weight: bold; width: 150px; color: #d9534f; }
        .var-value { color: #2c7bd1; word-break: break-all; }
        .raw-url { background: #eee; padding: 10px; margin-top: 20px; font-size: 11px; }
        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Deledao Data Debugger</h2>
    <div id="results">Scanning for variables...</div>

    <h3>Complete Raw URL</h3>
    <div class="raw-url" id="raw-url"></div>
</div>

<script>
    (function() {
        const fullUrl = window.location.href;
        const params = new URLSearchParams(window.location.search);
        const resultsContainer = document.getElementById('results');
        
        document.getElementById('raw-url').textContent = fullUrl;

        let html = "";
        
        // List of all known Deledao variables to check for
        const keysToCheck = [
            'uid', 'ou', 'site', 'category', 'cname', 
            'pgroup', 'title', 'vendor', 'norc', 
            'nodwl', 'allowed', 'uburl', 'type', 'upgrade'
        ];

        keysToCheck.forEach(key => {
            let val = params.get(key);
            html += `<div class="var-row">
                        <div class="var-name">${key}:</div>
                        <div class="var-value">${val ? decodeURIComponent(val) : '<span style="color:gray">EMPTY</span>'}</div>
                     </div>`;
        });

        // Also check for any variables NOT in the list (unexpected data)
        params.forEach((value, key) => {
            if (!keysToCheck.includes(key)) {
                html += `<div class="var-row" style="background:#fff9c4">
                            <div class="var-name">${key} (Extra):</div>
                            <div class="var-value">${decodeURIComponent(value)}</div>
                         </div>`;
            }
        });

        resultsContainer.innerHTML = html;
    })();
</script>

</body>
</html>
