<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCRSD | Access Restricted</title>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Roboto:400,700,900');
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #121212; color: #fcfcfc; font-family: 'Roboto', sans-serif; overflow: hidden; }
        .background-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #333 0%, #121212 100%); z-index: -1; }
        .card { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 500px; padding: 35px; text-align: center; border-radius: 12px; border: 2px solid #00AAD7; background: rgba(18, 18, 18, 0.98); box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .district { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 10px; }
        h1 { color: #00AAD7; font-size: 32px; font-weight: 900; margin: 0 0 25px 0; }
        
        .data-grid { text-align: left; margin-bottom: 25px; }
        .item { margin-bottom: 15px; border-left: 3px solid #333; padding-left: 15px; transition: border-color 0.3s; }
        .item:hover { border-color: #00AAD7; }
        .label { color: #00AAD7; font-size: 10px; font-weight: 900; text-transform: uppercase; display: block; }
        .value { font-size: 15px; color: #fff; display: block; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; }

        .status-alert { font-size: 11px; color: #ffcc00; margin-bottom: 20px; background: rgba(255,204,0,0.1); padding: 8px; border-radius: 4px; display: none; }

        .btn-unblock { background: #00AAD7; color: white; border: none; padding: 14px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; font-size: 14px; box-shadow: 0 4px 15px rgba(0,170,215,0.3); }
        .btn-unblock:disabled { background: #222; color: #444; box-shadow: none; cursor: not-allowed; }
        
        footer { margin-top: 30px; display: flex; justify-content: space-between; font-size: 9px; color: #333; }
        #debug-hover:hover { color: #666; cursor: help; }
    </style>
</head>
<body>
<div class="background-overlay"></div>
<main class="card" role="alert">
    <div class="district">Maricopa County Regional SD</div>
    <h1>Blocked</h1>
    
    <div id="id-warning" class="status-alert">⚠️ Student identity not detected. Please verify Chrome Sync.</div>

    <div class="data-grid">
        <div class="item"><span class="label">User</span><span id="uid" class="value">---</span></div>
        <div class="item"><span class="label">Site</span><span id="website" class="value">---</span></div>
        <div class="item"><span class="label">Type</span><span id="category" class="value">---</span></div>
    </div>

    <div id="action-area">
        <button id="unblockreq" class="btn-unblock">Request Access</button>
    </div>

    <footer>
        <span>ADA 2.1 COMPLIANT</span>
        <span id="debug-hover" title="Checking URL parameters...">VER 1.2.3</span>
    </footer>
</main>

<script>
    (function() {
        // Function to find params in both ?search and #fragments
        const getParam = (name) => {
            const pattern = new RegExp('[?&#]' + name + '=([^&#]*)');
            const match = window.location.href.match(pattern);
            return match ? decodeURIComponent(match[1]) : null;
        };

        const uid = getParam("uid");
        const site = getParam("site");
        const cat = getParam("category");
        const nodwl = getParam("nodwl");

        // UI Updates
        if (uid) {
            document.getElementById("uid").innerText = uid;
        } else {
            document.getElementById("id-warning").style.display = "block";
        }

        if (site) {
            document.getElementById("website").innerText = site.replace(/^https?:\/\//, '').split('/')[0];
        }
        
        if (cat) document.getElementById("category").innerText = cat;

        // Button Control
        const btn = document.getElementById("unblockreq");
        if (nodwl === "true" || !uid) {
            btn.disabled = true;
            btn.innerText = "Unblock Unavailable";
        }

        // Teacher Debug Tool
        document.getElementById("debug-hover").title = "URL: " + window.location.search;
    })();
</script>
</body>
</html>
